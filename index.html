<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day ❤️</title>
    <style>
        body {
            background: #ffe6ea;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #d63384;
            margin-top: 50px;
            animation: fadeIn Down 1.5s ease-out;
            font-size: 1.8rem;
        }
        .gallery-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .gallery {
            position: relative;
            width: 90%;
            max-width: 350px;
            height: 450px;
            margin-top: 40px;
        }
        .photo-card {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: all 1s ease;
            opacity: 1;
        }
        .photo-card:nth-child(1) { z-index: 5; transform: rotate(0deg) scale(1); }
        .photo-card:nth-child(2) { z-index: 4; transform: rotate(-9deg) scale(0.95) translateY(10px); }
        .photo-card:nth-child(3) { z-index: 3; transform: rotate(3deg) scale(0.9) translateY(20px); }
        .photo-card:nth-child(4) { z-index: 2; transform: rotate(-5deg) scale(0.85) translateY(30px); }
        .photo-card:nth-child(5) { z-index: 1; transform: rotate(5deg) scale(0.8) translateY(40px); }
        .message {
            margin-top: 50px;
            font-size: 1.2rem;
            color: #a91b60;
            animation: fadeIn 4s ease-in;
        }
    </style>
</head>

<body>
    <h1>Happy Valentine's Day! ❤️</h1>
    <div class="gallery-box">
        <div class="gallery">
            <img src="assets/img-1.jpeg" alt="Our Moment" class="photo-card slide-left">
            <img src="assets/img-2.jpeg" alt="Beautiful Memories" class="photo-card slide-right">
            <img src="assets/img-3.jpeg" alt="Us" class="photo-card slide-left" style="animation-delay: 2.5s;">
            <img src="assets/img-4.jpeg" alt="Us" class="photo-card slide-left" style="animation-delay: 2.5s;">
            <img src="assets/img-5.jpeg" alt="Us" class="photo-card slide-left" style="animation-delay: 2.5s;">
        </div>
    </div>
    <div class="message">
        <p>Har din tumhare saath Valentine's Day jaisa hai...</p>
    </div>
    <script>
        const gallery = document.querySelector(".gallery");

        setInterval(() => {
            const first = gallery.firstElementChild;
            gallery.appendChild(first);
        }, 4000);
    </script>
</body>
</html>
