<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>linkedInJobSearch</title>
    <style>
        .prank-box{
            position: relative;
        }
        .text-box p{
            color: white;
            background: black;
            padding: 3px 9px;
            font-family: cursive;
            font-size: 25px;
        }
        .text-box{
            position: absolute;
            top: 50%;
            left: 50px;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <div class="prank-box">
        <video id="myVideo" autoplay loop muted playsinline>
            <source src="assets/linkedIn-job-search.mp4" type="video/mp4">
        </video>
        <div class="text-box">
            <p>Ullu Banaya Bada</p>
            <p>Maza aaya 😂</p>
        </div>
    </div>
    

    <script>
        // document.body.addEventListener("click", function () {
        //     document.getElementById("myVideo").play();
        // });
        window.addEventListener("load", () => {
            const video = document.getElementById("myVideo");

            // pehle muted autoplay
            video.play();

            // jaise hi user kahi bhi click kare → sound on
            document.body.addEventListener("click", () => {
                video.muted = false;
                video.play();
            });
        });
    </script>
</body>
</html>
